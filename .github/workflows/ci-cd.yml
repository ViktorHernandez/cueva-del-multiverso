name: CI/CD - Cueva del Multiverso

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # JOB 1: CI — Integración Continua
  # Instala dependencias y verifica que el
  # proyecto arranca correctamente.
  # ─────────────────────────────────────────
  ci:
    name: 🔍 Integración Continua
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Instalar dependencias del backend
        working-directory: backend
        run: npm ci

      - name: 🔎 Verificar que server.js existe y tiene sintaxis válida
        working-directory: backend
        run: node --check server.js

      - name: 🔎 Verificar que models.js tiene sintaxis válida
        working-directory: backend
        run: node --check models.js

      - name: 🔎 Verificar que passport.js tiene sintaxis válida
        working-directory: backend
        run: node --check config/passport.js

      - name: ✅ CI completado — código listo para deploy
        run: echo "Todos los checks de integración continua pasaron correctamente."

  # ─────────────────────────────────────────
  # JOB 2: CD — Despliegue Continuo a Render
  # Solo se ejecuta cuando hay push a main
  # y el job CI pasó exitosamente.
  # ─────────────────────────────────────────
  cd:
    name: 🚀 Despliegue a Render
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🚀 Disparar deploy en Render via Deploy Hook
        run: |
          echo "Enviando señal de deploy a Render..."
          curl -s --fail "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null \
            -w "HTTP Status: %{http_code}\n"

      - name: ✅ Deploy iniciado correctamente
        run: echo "Render recibió la señal. El despliegue está en progreso."
